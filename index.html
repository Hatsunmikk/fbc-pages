<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
        <title>Free Books</title>
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <div id="desktop-message">
            <h1>Free Books</h1>

            <p>
                We are only operational on mobiles,
                so please view this link on your phone.
            </p>
        </div>
        <div id="mobile-app">

          <header class="header">

            <div class="header-left">
               <h1>Free Books</h1>
               <p>Gurgaon</p>
            </div>

            <div class="header-right">
                <button>🔍</button>
                <button>+</button>
                <button>👤</button>
            </div>

          </header>

          <section class="banner">

            <img class="banner-books"
                 src="./assets/images/banner-books.png"
                 alt="">

            <img class="banner-logo"
                 src="./assets/images/banner-logo.png"
                 alt="Libraries Everywhere">

          </section>

          <section class="filters">
            
            <select id="sort-filter" class="filter-select">
                <option value="default">sort</option>
                <option value="title-asc">A-Z</option>
                <option value="title-desc">Z-A</option>
                <option value="rating-desc">highest rated</option>
            </select>

            <select id="type-filter" class="filter-select">
                <option value="all">fic/nonfic</option>
                <option value="Fiction">fiction</option>
                <option value="Non Fiction">non-fiction</option>
            </select>

            <select id="genre-filter" class="filter-select">
                <option value="all">genres</option>
            </select>
            
            <button class="filter-btn" id="rating-filter">rating: 4+</button>

          </section>

          <section class="books-section">

             <h2>All Books</h2>

             <div class="books-grid"></div>


          </section>

          <section class="end-books">
            
              <img src="./assets/icons/barrier.svg"
                   alt=""
                   class="end-icon">

          </section>

          <nav class="bottom-nav">
            
            <div class="nav-item">
                <span>📖</span>
                <p>read</p>
            </div>

            <div class="nav-item active-nav">
                <span>📚</span>
                <p>borrow</p>
            </div>

            <div class="nav-item">
                <span>🗺️</span>
                <p>explore</p>
            </div>

            <div class="nav-item">
                <span>👥</span>
                <p>meets</p>
            </div>

            <div class="nav-item">
                <span>💬</span>
                <p>chat</p>
            </div>

          </nav>

        </div>
        <script src="./js/books.js"></script>
       <script src="./js/app.js"></script>
    </body>
    
</html>
