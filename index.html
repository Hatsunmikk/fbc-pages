<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
        <title>Free Books</title>
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <div id="desktop-message">
            <h1>Free Books</h1>

            <p>
                We are only operational on mobiles,
                so please view this link on your phone.
            </p>
        </div>
        <div id="mobile-app">

          <header class="header">

            <div class="header-left">
               <h1>Free Books</h1>
               <p>Gurgaon</p>
            </div>

            <div class="header-right">
                <button>🔍</button>
                <button>+</button>
                <button>👤</button>
            </div>

          </header>

          <section class="banner">

            <img class="banner-books"
                 src="./assets/images/banner-books.png"
                 alt="">

            <img class="banner-logo"
                 src="./assets/images/banner-logo.png"
                 alt="Libraries Everywhere">

          </section>

          <section class="filters">

            <button class="filter-btn" id="sort-filter">sort ▼</button>
            <button class="filter-btn" id="type-filter">fic/nonfic</button>
            <button class="filter-btn" id="genre-filter">genres</button>
            <button class="filter-btn" id="rating-filter">rating: 4+</button>

          </section>

          <section class="books-section">

             <h2>All Books</h2>

             <div class="books-grid"></div>


          </section>
        </div>
        <script src="./js/books.js"></script>
       <script src="./js/app.js"></script>
    </body>
    
</html>
